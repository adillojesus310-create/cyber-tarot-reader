services:
  - type: web
    name: cyber-tarot-reader
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-pro
      - key: DEEPSEEK_API_KEY
        sync: false
